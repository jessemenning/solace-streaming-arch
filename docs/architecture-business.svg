<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00C895"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FCA829"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#03213B"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-family="'New Spirit','Georgia',serif" font-size="24" font-weight="bold" fill="#ABFF88">Real-Time Event Intelligence</text>
  <!-- Subtitle -->
  <text x="600" y="68" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="13" fill="#FFFFFF">Solace Platform — micro-targeted streams and deep analytical context from one event fabric</text>

  <!-- Event Portal banner -->
  <rect x="30" y="82" width="1140" height="24" rx="6" fill="#03213B" stroke="#FCA829" stroke-width="1.2" stroke-dasharray="5,3"/>
  <circle cx="56" cy="94" r="6" fill="#FCA829" opacity="0.8"/>
  <text x="70" y="98" font-family="'Space Mono','Cascadia Mono',monospace" font-size="9.5" fill="#FCA829">Solace Event Portal</text>
  <text x="198" y="98" font-family="'Figtree','Segoe UI',sans-serif" font-size="9.5" fill="#FFFFFF" opacity="0.85"> — event catalog &amp; schema governance: every event defined once, every consumer sees only what it needs</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PANEL 1 — Event Sources (left)                         -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="116" width="210" height="240" rx="12" fill="#093B5F"/>

  <!-- Truck icon area -->
  <rect x="48" y="132" width="174" height="82" rx="8" fill="#ABFF88" opacity="0.12"/>
  <!-- Row 1 trucks -->
  <g fill="#ABFF88" opacity="0.9">
    <rect x="60" y="148" width="26" height="13" rx="2"/>
    <rect x="74" y="142" width="10" height="8" rx="2"/>
    <circle cx="64" cy="163" r="4"/>
    <circle cx="79" cy="163" r="4"/>
    <rect x="100" y="148" width="26" height="13" rx="2"/>
    <rect x="114" y="142" width="10" height="8" rx="2"/>
    <circle cx="104" cy="163" r="4"/>
    <circle cx="119" cy="163" r="4"/>
    <rect x="140" y="148" width="26" height="13" rx="2"/>
    <rect x="154" y="142" width="10" height="8" rx="2"/>
    <circle cx="144" cy="163" r="4"/>
    <circle cx="159" cy="163" r="4"/>
    <!-- Row 2 trucks -->
    <rect x="60" y="174" width="26" height="13" rx="2"/>
    <rect x="74" y="168" width="10" height="8" rx="2"/>
    <circle cx="64" cy="189" r="4"/>
    <circle cx="79" cy="189" r="4"/>
    <rect x="100" y="174" width="26" height="13" rx="2"/>
    <rect x="114" y="168" width="10" height="8" rx="2"/>
    <circle cx="104" cy="189" r="4"/>
    <circle cx="119" cy="189" r="4"/>
    <rect x="140" y="174" width="26" height="13" rx="2"/>
    <rect x="154" y="168" width="10" height="8" rx="2"/>
    <circle cx="144" cy="189" r="4"/>
    <circle cx="159" cy="189" r="4"/>
  </g>

  <text x="135" y="234" text-anchor="middle" font-family="'New Spirit','Georgia',serif" font-size="15" font-weight="bold" fill="#FFFFFF">Event Sources</text>
  <text x="135" y="253" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">IoT devices, applications,</text>
  <text x="135" y="269" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">services — 20 vehicles</text>
  <text x="135" y="285" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">publishing in real time</text>

  <!-- Badge -->
  <rect x="52" y="326" width="166" height="20" rx="5" fill="#00C895" opacity="0.2"/>
  <text x="135" y="340" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="9" fill="#ABFF88">continuous event stream</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROW 1 → 2                                            -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="242" y1="236" x2="286" y2="236" stroke="#00C895" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="228" y="244" width="80" height="16" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="268" y="256" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="9" fill="#00C895">publish events</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PANEL 2 — Solace Platform (center, tall)               -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="290" y="116" width="210" height="420" rx="12" fill="#093B5F"/>

  <!-- Hub/spoke icon -->
  <rect x="308" y="132" width="174" height="82" rx="8" fill="#ABFF88" opacity="0.12"/>
  <circle cx="395" cy="173" r="14" fill="none" stroke="#00C895" stroke-width="2.5"/>
  <circle cx="395" cy="173" r="5" fill="#00C895"/>
  <line x1="382" y1="161" x2="365" y2="147" stroke="#00C895" stroke-width="1.5"/>
  <circle cx="361" cy="143" r="5" fill="none" stroke="#ABFF88" stroke-width="2"/>
  <line x1="408" y1="161" x2="425" y2="147" stroke="#00C895" stroke-width="1.5"/>
  <circle cx="429" cy="143" r="5" fill="none" stroke="#ABFF88" stroke-width="2"/>
  <line x1="382" y1="185" x2="365" y2="199" stroke="#00C895" stroke-width="1.5"/>
  <circle cx="361" cy="203" r="5" fill="none" stroke="#ABFF88" stroke-width="2"/>
  <line x1="408" y1="185" x2="425" y2="199" stroke="#00C895" stroke-width="1.5"/>
  <circle cx="429" cy="203" r="5" fill="none" stroke="#ABFF88" stroke-width="2"/>
  <line x1="395" y1="159" x2="395" y2="143" stroke="#00C895" stroke-width="1.5"/>
  <circle cx="395" cy="139" r="5" fill="none" stroke="#ABFF88" stroke-width="2"/>
  <line x1="395" y1="187" x2="395" y2="203" stroke="#00C895" stroke-width="1.5"/>
  <circle cx="395" cy="207" r="5" fill="none" stroke="#ABFF88" stroke-width="2"/>

  <text x="395" y="238" text-anchor="middle" font-family="'New Spirit','Georgia',serif" font-size="15" font-weight="bold" fill="#FFFFFF">Solace Platform</text>
  <text x="395" y="257" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">Routes every event to the</text>
  <text x="395" y="273" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">right consumer — instantly,</text>
  <text x="395" y="289" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">reliably, at scale</text>

  <!-- Divider -->
  <line x1="310" y1="308" x2="480" y2="308" stroke="#00C895" stroke-width="0.5" opacity="0.4"/>

  <!-- Native Solace Connector sub-section inside Solace panel -->
  <text x="395" y="328" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="9" fill="#FCA829">Native Solace Connector</text>
  <text x="395" y="344" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="10" fill="#FFFFFF" opacity="0.85">Direct SMF queue binding —</text>
  <text x="395" y="358" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="10" fill="#FFFFFF" opacity="0.85">no proxy or HTTP bridge</text>

  <!-- Divider -->
  <line x1="310" y1="374" x2="480" y2="374" stroke="#00C895" stroke-width="0.5" opacity="0.4"/>

  <!-- Badge sub-millisecond -->
  <rect x="312" y="380" width="166" height="20" rx="5" fill="#00C895" opacity="0.2"/>
  <text x="395" y="394" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="9" fill="#ABFF88">sub-millisecond routing</text>

  <!-- Fan-out label -->
  <text x="395" y="420" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="10" fill="#FFFFFF" opacity="0.6">Micro-targeted streams</text>
  <text x="395" y="436" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="10" fill="#FFFFFF" opacity="0.6">to every consumer type</text>
  <text x="395" y="452" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="10" fill="#FFFFFF" opacity="0.6">simultaneously</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROWS 2 → consumer boxes (fan-out from right edge)    -->
  <!-- Arrow to IoT Devices (y=162) -->
  <line x1="502" y1="162" x2="546" y2="162" stroke="#00C895" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow to Microservices (y=280) -->
  <line x1="502" y1="280" x2="546" y2="280" stroke="#00C895" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow to AI Agents (y=398) -->
  <line x1="502" y1="398" x2="546" y2="398" stroke="#00C895" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Fan-out visual lines from Solace right edge -->
  <!-- Vertical connector line on Solace right side -->
  <line x1="502" y1="162" x2="502" y2="398" stroke="#00C895" stroke-width="1.5" opacity="0.5"/>

  <!-- Labels on fan-out arrows -->
  <rect x="504" y="150" width="88" height="14" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="548" y="161" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="8.5" fill="#00C895">field commands</text>

  <rect x="504" y="268" width="80" height="14" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="544" y="279" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="8.5" fill="#00C895">event triggers</text>

  <rect x="504" y="386" width="86" height="14" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="547" y="397" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="8.5" fill="#00C895">real-time alerts</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CONSUMER BOX 1 — IoT Devices / Field Systems           -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="550" y="116" width="280" height="100" rx="10" fill="#093B5F"/>
  <!-- Sensor/wave icon -->
  <circle cx="598" cy="152" r="8" fill="none" stroke="#00C895" stroke-width="2"/>
  <path d="M582 152 Q590 138 598 152 Q606 166 614 152" fill="none" stroke="#ABFF88" stroke-width="1.5"/>
  <circle cx="598" cy="152" r="3" fill="#00C895"/>
  <text x="730" y="144" text-anchor="middle" font-family="'New Spirit','Georgia',serif" font-size="13" font-weight="bold" fill="#FFFFFF">IoT Devices &amp; Field Systems</text>
  <text x="730" y="162" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">Actuate devices, trigger field responses</text>
  <text x="730" y="178" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">on exactly the events they care about</text>
  <rect x="573" y="190" width="234" height="16" rx="4" fill="#00C895" opacity="0.18"/>
  <text x="690" y="202" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="8.5" fill="#ABFF88">instant, no polling</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CONSUMER BOX 2 — Microservices                         -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="550" y="234" width="280" height="100" rx="10" fill="#093B5F"/>
  <!-- Services icon: 3 stacked rectangles -->
  <rect x="576" y="258" width="28" height="7" rx="2" fill="#00C895" opacity="0.8"/>
  <rect x="576" y="269" width="28" height="7" rx="2" fill="#ABFF88" opacity="0.8"/>
  <rect x="576" y="280" width="28" height="7" rx="2" fill="#00C895" opacity="0.5"/>
  <text x="730" y="262" text-anchor="middle" font-family="'New Spirit','Georgia',serif" font-size="13" font-weight="bold" fill="#FFFFFF">Microservices &amp; Applications</text>
  <text x="730" y="280" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">Event-driven processing — each service</text>
  <text x="730" y="296" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">subscribes only to what it needs</text>
  <rect x="573" y="308" width="234" height="16" rx="4" fill="#00C895" opacity="0.18"/>
  <text x="690" y="320" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="8.5" fill="#ABFF88">decoupled, independently scalable</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- CONSUMER BOX 3 — AI Agents (dual-path)                 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="550" y="352" width="280" height="130" rx="10" fill="#093B5F" stroke="#00C895" stroke-width="1.5"/>
  <!-- Robot/agent icon -->
  <rect x="574" y="374" width="20" height="16" rx="3" fill="none" stroke="#00C895" stroke-width="2"/>
  <circle cx="579" cy="380" r="2.5" fill="#ABFF88"/>
  <circle cx="588" cy="380" r="2.5" fill="#ABFF88"/>
  <line x1="580" y1="390" x2="594" y2="390" stroke="#00C895" stroke-width="1.5"/>
  <line x1="584" y1="390" x2="584" y2="396" stroke="#ABFF88" stroke-width="1.5"/>
  <line x1="590" y1="390" x2="590" y2="396" stroke="#ABFF88" stroke-width="1.5"/>
  <text x="730" y="378" text-anchor="middle" font-family="'New Spirit','Georgia',serif" font-size="13" font-weight="bold" fill="#FFFFFF">AI Agents</text>
  <text x="730" y="396" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">React instantly to real-time alerts</text>
  <text x="730" y="412" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">from Solace — then query RisingWave</text>
  <text x="730" y="428" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">for pre-computed context</text>
  <rect x="573" y="444" width="234" height="16" rx="4" fill="#00C895" opacity="0.2"/>
  <text x="690" y="456" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="8.5" fill="#ABFF88">trigger + research, same fabric</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PANEL 4 — RisingWave (bottom right)                    -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="870" y="234" width="300" height="280" rx="12" fill="#093B5F"/>

  <!-- Lens/magnifier icon with SQL bars -->
  <rect x="888" y="250" width="264" height="88" rx="8" fill="#ABFF88" opacity="0.12"/>
  <circle cx="1020" cy="294" r="28" fill="none" stroke="#00C895" stroke-width="2.5"/>
  <rect x="1004" y="303" width="7" height="10" rx="1" fill="#ABFF88" opacity="0.9"/>
  <rect x="1015" y="292" width="7" height="21" rx="1" fill="#00C895" opacity="0.9"/>
  <rect x="1026" y="284" width="7" height="29" rx="1" fill="#ABFF88" opacity="0.9"/>
  <line x1="1042" y1="316" x2="1056" y2="330" stroke="#00C895" stroke-width="3" stroke-linecap="round"/>

  <text x="1020" y="360" text-anchor="middle" font-family="'New Spirit','Georgia',serif" font-size="15" font-weight="bold" fill="#FFFFFF">Streaming Analytics</text>
  <text x="1020" y="378" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="12" fill="#ABFF88">RisingWave</text>
  <text x="1020" y="398" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">Pre-computed views: averages,</text>
  <text x="1020" y="414" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">joins, windows, geofences —</text>
  <text x="1020" y="430" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF">always current, query in SQL</text>

  <rect x="892" y="444" width="256" height="20" rx="5" fill="#00C895" opacity="0.2"/>
  <text x="1020" y="458" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="9" fill="#ABFF88">new view = SQL query, not a sprint</text>

  <!-- RisingWave feature list -->
  <text x="892" y="486" font-family="'Figtree','Segoe UI',sans-serif" font-size="10" fill="#FFFFFF" opacity="0.75">• 5-min rolling speed averages</text>
  <text x="892" y="500" font-family="'Figtree','Segoe UI',sans-serif" font-size="10" fill="#FFFFFF" opacity="0.75">• Multi-stream correlated joins</text>
  <text x="892" y="514" font-family="'Figtree','Segoe UI',sans-serif" font-size="10" fill="#FFFFFF" opacity="0.75">• Geofence membership, fleet summaries</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROW: Solace → RisingWave (Native Solace Connector / bottom path) -->
  <!-- Goes down from Solace bottom, right to RisingWave      -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Down from Solace bottom center -->
  <line x1="395" y1="538" x2="395" y2="580" stroke="#FCA829" stroke-width="2"/>
  <!-- Right to below RisingWave -->
  <line x1="395" y1="580" x2="1020" y2="580" stroke="#FCA829" stroke-width="2"/>
  <!-- Up to RisingWave bottom -->
  <line x1="1020" y1="580" x2="1020" y2="516" stroke="#FCA829" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <!-- Label -->
  <rect x="630" y="568" width="160" height="16" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="710" y="580" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="9" fill="#FCA829">Native Solace Connector (SMF)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROW: AI Agents → RisingWave (deep research)          -->
  <!-- Horizontal from right edge of AI Agents box to RW left -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="832" y1="417" x2="868" y2="417" stroke="#00C895" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="826" y="424" width="106" height="14" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="879" y="435" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="8.5" fill="#00C895">deep research</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- BOTTOM CAPTION                                         -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <text x="600" y="625" text-anchor="middle" font-family="'Figtree','Segoe UI',sans-serif" font-size="11" fill="#FFFFFF" opacity="0.6">The same event fabric delivers instant triggers to every consumer and powers deep analytical context for AI — no separate pipeline required.</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEGEND (bottom right)                                  -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="870" y="640" width="300" height="80" rx="8" fill="#03213B" opacity="0.6"/>
  <text x="1020" y="660" text-anchor="middle" font-family="'Space Mono','Cascadia Mono',monospace" font-size="9" fill="#FFFFFF" opacity="0.7">Legend</text>
  <line x1="888" y1="674" x2="920" y2="674" stroke="#00C895" stroke-width="2"/>
  <text x="928" y="678" font-family="'Figtree','Segoe UI',sans-serif" font-size="10" fill="#FFFFFF" opacity="0.75">Real-time event stream</text>
  <line x1="888" y1="694" x2="920" y2="694" stroke="#FCA829" stroke-width="2"/>
  <text x="928" y="698" font-family="'Figtree','Segoe UI',sans-serif" font-size="10" fill="#FFFFFF" opacity="0.75">Native Solace Connector (SMF)</text>

</svg>
