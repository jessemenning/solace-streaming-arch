<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580" font-family="Figtree, Segoe UI, sans-serif">

  <!-- Background -->
  <rect width="900" height="580" fill="#03213B"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#FFFFFF">Historical Backfill &amp; Live Cutover — Architecture Overview</text>

  <!-- Swimlane column backgrounds -->
  <!-- Col 1: Solace Queue (x=20, w=195) -->
  <rect x="20" y="50" width="195" height="510" rx="6" fill="#03213B" stroke="#093B5F" stroke-width="1.5"/>
  <!-- Col 2: Connector (x=230, w=185) -->
  <rect x="230" y="50" width="185" height="510" rx="6" fill="#03213B" stroke="#093B5F" stroke-width="1.5"/>
  <!-- Col 3: RisingWave (x=430, w=200) -->
  <rect x="430" y="50" width="200" height="510" rx="6" fill="#03213B" stroke="#093B5F" stroke-width="1.5"/>
  <!-- Col 4: Consumer (x=645, w=235) -->
  <rect x="645" y="50" width="235" height="510" rx="6" fill="#03213B" stroke="#093B5F" stroke-width="1.5"/>

  <!-- Column header boxes -->
  <rect x="20" y="50" width="195" height="44" rx="6" fill="#093B5F"/>
  <rect x="230" y="50" width="185" height="44" rx="6" fill="#093B5F"/>
  <rect x="430" y="50" width="200" height="44" rx="6" fill="#093B5F"/>
  <rect x="645" y="50" width="235" height="44" rx="6" fill="#093B5F"/>

  <!-- Column header text -->
  <text x="117" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Solace Queue</text>
  <text x="322" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Connector</text>
  <text x="530" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">RisingWave</text>
  <text x="762" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Consumer</text>

  <!-- Vertical divider lines (subtle) -->
  <line x1="215" y1="95" x2="215" y2="555" stroke="#093B5F" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="415" y1="95" x2="415" y2="555" stroke="#093B5F" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="630" y1="95" x2="630" y2="555" stroke="#093B5F" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ============================================================ -->
  <!-- PHASE 1: Historical events (y ~115–175) -->
  <!-- ============================================================ -->

  <!-- Phase label -->
  <rect x="25" y="108" width="870" height="18" rx="3" fill="#093B5F" opacity="0.55"/>
  <text x="450" y="121" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#ABFF88">PHASE 1 — HISTORICAL DRAIN</text>

  <!-- Queue stack (historical messages) -->
  <rect x="45" y="135" width="145" height="26" rx="4" fill="#00C895" opacity="0.25" stroke="#00C895" stroke-width="1"/>
  <text x="117" y="152" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#00C895">historical events</text>
  <rect x="45" y="164" width="145" height="26" rx="4" fill="#00C895" opacity="0.18" stroke="#00C895" stroke-width="1"/>
  <text x="117" y="181" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#00C895">historical events</text>
  <rect x="45" y="193" width="145" height="26" rx="4" fill="#00C895" opacity="0.12" stroke="#00C895" stroke-width="1"/>
  <text x="117" y="210" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#00C895">historical events</text>

  <!-- Arrow: Queue → Connector (historical) -->
  <line x1="190" y1="175" x2="258" y2="175" stroke="#00C895" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Connector processing box -->
  <rect x="258" y="155" width="130" height="40" rx="5" fill="#093B5F" stroke="#00C895" stroke-width="1.2"/>
  <text x="323" y="172" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#00C895">reads FIFO</text>
  <text x="323" y="186" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#00C895">from queue</text>

  <!-- Arrow: Connector → RisingWave (historical events) -->
  <line x1="388" y1="175" x2="456" y2="175" stroke="#00C895" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Label with scrim -->
  <rect x="374" y="152" width="95" height="17" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="421" y="164" text-anchor="middle" font-size="9" font-family="'Space Mono', monospace" fill="#00C895">historical events</text>

  <!-- RisingWave MV building -->
  <rect x="456" y="155" width="145" height="40" rx="5" fill="#093B5F" stroke="#00C895" stroke-width="1.2"/>
  <text x="528" y="172" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#00C895">MVs build</text>
  <text x="528" y="186" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#00C895">incrementally</text>

  <!-- Consumer waiting -->
  <rect x="665" y="155" width="195" height="40" rx="5" fill="#093B5F" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="762" y="179" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#FFFFFF" opacity="0.5">waiting…</text>

  <!-- ============================================================ -->
  <!-- PHASE 2: Sentinel detection (y ~235–310) -->
  <!-- ============================================================ -->

  <rect x="25" y="228" width="870" height="18" rx="3" fill="#093B5F" opacity="0.55"/>
  <text x="450" y="241" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#FCA829">PHASE 2 — SENTINEL DETECTION</text>

  <!-- Sentinel message in queue (orange, distinct) -->
  <rect x="45" y="255" width="145" height="30" rx="4" fill="#FCA829" opacity="0.85" stroke="#FCA829" stroke-width="1.5"/>
  <text x="117" y="275" text-anchor="middle" font-size="11" font-weight="bold" font-family="'Space Mono', monospace" fill="#03213B">sentinel</text>

  <!-- Arrow: Queue → Connector (sentinel) -->
  <line x1="190" y1="270" x2="258" y2="270" stroke="#FCA829" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Connector intercept box -->
  <rect x="258" y="250" width="130" height="42" rx="5" fill="#093B5F" stroke="#FCA829" stroke-width="1.5"/>
  <text x="323" y="267" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#FCA829">intercepts</text>
  <text x="323" y="281" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#FCA829">sentinel</text>

  <!-- X mark — sentinel does NOT go to RisingWave -->
  <!-- Dashed line from connector toward RisingWave, ending with X -->
  <line x1="388" y1="271" x2="430" y2="271" stroke="#FCA829" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="438" y="268" font-size="14" font-weight="bold" fill="#FCA829">✕</text>

  <!-- Label: intercepted -->
  <rect x="362" y="280" width="125" height="17" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="424" y="292" text-anchor="middle" font-size="9" font-family="'Space Mono', monospace" fill="#FCA829">never reaches RisingWave</text>

  <!-- ============================================================ -->
  <!-- PHASE 3: Barrier flush (y ~330–385) -->
  <!-- ============================================================ -->

  <rect x="25" y="325" width="870" height="18" rx="3" fill="#093B5F" opacity="0.55"/>
  <text x="450" y="338" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#C2F7FF">PHASE 3 — BARRIER FLUSH &amp; READINESS</text>

  <!-- Barrier flush: Connector ↔ RisingWave -->
  <line x1="388" y1="365" x2="456" y2="365" stroke="#C2F7FF" stroke-width="2" marker-end="url(#arrow-skyblue)"/>
  <line x1="456" y1="371" x2="388" y2="371" stroke="#C2F7FF" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-skyblue-rev)"/>
  <!-- Label scrim -->
  <rect x="369" y="348" width="104" height="17" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="421" y="360" text-anchor="middle" font-size="9" font-family="'Space Mono', monospace" fill="#C2F7FF">WAIT — flush all MVs</text>

  <!-- Connector box for flush phase -->
  <rect x="258" y="348" width="130" height="40" rx="5" fill="#093B5F" stroke="#C2F7FF" stroke-width="1.2"/>
  <text x="323" y="365" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#C2F7FF">barrier flush</text>
  <text x="323" y="379" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#C2F7FF">triggered</text>

  <!-- RisingWave flush box -->
  <rect x="456" y="348" width="145" height="40" rx="5" fill="#093B5F" stroke="#C2F7FF" stroke-width="1.2"/>
  <text x="528" y="365" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#C2F7FF">checkpoint</text>
  <text x="528" y="379" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#C2F7FF">committed</text>

  <!-- Readiness event → Consumer (from connector) -->
  <line x1="388" y1="393" x2="665" y2="410" stroke="#00C895" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Label scrim -->
  <rect x="455" y="393" width="148" height="17" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="529" y="405" text-anchor="middle" font-size="9" font-family="'Space Mono', monospace" fill="#00C895">readiness event (Solace topic)</text>

  <!-- Status table fallback → RisingWave (from connector) -->
  <line x1="388" y1="400" x2="456" y2="400" stroke="#009193" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-darkgreen)"/>
  <!-- Label scrim -->
  <rect x="371" y="407" width="107" height="17" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="424" y="419" text-anchor="middle" font-size="9" font-family="'Space Mono', monospace" fill="#009193">status table (fallback)</text>

  <!-- Consumer ready box -->
  <rect x="665" y="402" width="195" height="36" rx="5" fill="#093B5F" stroke="#00C895" stroke-width="1.5"/>
  <text x="762" y="418" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#00C895">ready signal received</text>
  <text x="762" y="431" text-anchor="middle" font-size="9" font-family="'Space Mono', monospace" fill="#00C895">or status table on startup</text>

  <!-- ============================================================ -->
  <!-- PHASE 4: Live events resume (y ~450–510) -->
  <!-- ============================================================ -->

  <rect x="25" y="450" width="870" height="18" rx="3" fill="#093B5F" opacity="0.55"/>
  <text x="450" y="463" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#ABFF88">PHASE 4 — LIVE EVENTS RESUME</text>

  <!-- Live messages in queue -->
  <rect x="45" y="475" width="145" height="24" rx="4" fill="#ABFF88" opacity="0.25" stroke="#ABFF88" stroke-width="1"/>
  <text x="117" y="491" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#ABFF88">live events</text>
  <rect x="45" y="502" width="145" height="24" rx="4" fill="#ABFF88" opacity="0.15" stroke="#ABFF88" stroke-width="1"/>
  <text x="117" y="518" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#ABFF88">live events</text>

  <!-- Arrow: Queue → Connector (live) -->
  <line x1="190" y1="497" x2="258" y2="497" stroke="#ABFF88" stroke-width="2" marker-end="url(#arrow-bright)"/>

  <!-- Connector live box -->
  <rect x="258" y="478" width="130" height="38" rx="5" fill="#093B5F" stroke="#ABFF88" stroke-width="1.2"/>
  <text x="323" y="495" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#ABFF88">continuous</text>
  <text x="323" y="509" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#ABFF88">ingest</text>

  <!-- Arrow: Connector → RisingWave (live) -->
  <line x1="388" y1="497" x2="456" y2="497" stroke="#ABFF88" stroke-width="2" marker-end="url(#arrow-bright)"/>
  <!-- Label scrim -->
  <rect x="369" y="480" width="105" height="17" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="421" y="492" text-anchor="middle" font-size="9" font-family="'Space Mono', monospace" fill="#ABFF88">live events resume</text>

  <!-- RisingWave live box -->
  <rect x="456" y="478" width="145" height="38" rx="5" fill="#093B5F" stroke="#ABFF88" stroke-width="1.2"/>
  <text x="528" y="495" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#ABFF88">MVs updated</text>
  <text x="528" y="509" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#ABFF88">continuously</text>

  <!-- Consumer queries RisingWave -->
  <line x1="762" y1="452" x2="601" y2="497" stroke="#00C895" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Label scrim -->
  <rect x="647" y="462" width="94" height="17" rx="3" fill="#03213B" opacity="0.75"/>
  <text x="694" y="474" text-anchor="middle" font-size="9" font-family="'Space Mono', monospace" fill="#00C895">safe to query</text>

  <!-- Consumer box live phase -->
  <rect x="665" y="470" width="195" height="38" rx="5" fill="#093B5F" stroke="#00C895" stroke-width="1.5"/>
  <text x="762" y="487" text-anchor="middle" font-size="10" font-family="'Space Mono', monospace" fill="#00C895">query freely</text>
  <text x="762" y="501" text-anchor="middle" font-size="9" font-family="'Space Mono', monospace" fill="#00C895">history + live unified</text>

  <!-- ============================================================ -->
  <!-- Arrow marker definitions -->
  <!-- ============================================================ -->
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00C895"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FCA829"/>
    </marker>
    <marker id="arrow-skyblue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C2F7FF"/>
    </marker>
    <marker id="arrow-skyblue-rev" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#C2F7FF"/>
    </marker>
    <marker id="arrow-darkgreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#009193"/>
    </marker>
    <marker id="arrow-bright" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ABFF88"/>
    </marker>
  </defs>

</svg>
