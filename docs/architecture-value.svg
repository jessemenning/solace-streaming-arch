<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <style>
      .title { font-family: 'New Spirit','Georgia',serif; font-size: 26px; font-weight: bold; fill: #ABFF88; text-anchor: middle; }
      .subtitle { font-family: 'Figtree','Segoe UI',sans-serif; font-size: 14px; fill: #FFFFFF; text-anchor: middle; }
      .panel-header { font-family: 'Figtree','Segoe UI',sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .bullet { font-family: 'Figtree','Segoe UI',sans-serif; font-size: 13px; fill: #FFFFFF; }
      .section-label { font-family: 'Figtree','Segoe UI',sans-serif; font-size: 13px; fill: #FFFFFF; text-anchor: middle; }
      .card-question { font-family: 'Figtree','Segoe UI',sans-serif; font-size: 12px; font-weight: bold; fill: #FFFFFF; }
      .card-answer { font-family: 'Space Mono','Cascadia Mono',monospace; font-size: 10px; fill: #ABFF88; }
      .card-tag { font-family: 'Space Mono','Cascadia Mono',monospace; font-size: 9px; fill: #03213B; text-anchor: middle; }
      .vs-label { font-family: 'Figtree','Segoe UI',sans-serif; font-size: 16px; font-weight: bold; fill: #FFFFFF; text-anchor: middle; }
    </style>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00C895"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#03213B"/>

  <!-- ===== ROW 1: Header (y=0 to y=80) ===== -->
  <text x="600" y="38" class="title">From Event Routing to Event Intelligence</text>
  <text x="600" y="62" class="subtitle">Solace Platform + RisingWave</text>

  <!-- Thin separator line under header -->
  <line x1="80" y1="76" x2="1120" y2="76" stroke="#ABFF88" stroke-width="1" opacity="0.4"/>

  <!-- ===== ROW 2: Comparison panels (y=90 to y=360) ===== -->

  <!-- Left panel: "With Pub/Sub Alone" -->
  <rect x="40" y="90" width="500" height="260" fill="#093B5F" stroke="#FCA829" stroke-width="2" rx="10"/>

  <!-- Left panel header background -->
  <rect x="40" y="90" width="500" height="44" fill="#FCA829" opacity="0.18" rx="10"/>
  <rect x="40" y="112" width="500" height="22" fill="#FCA829" opacity="0.18"/>

  <text x="290" y="118" class="panel-header" fill="#FCA829">⚠  With Pub/Sub Alone — Topic Design Constraints</text>

  <!-- Left panel bullets -->
  <text x="62" y="156" class="bullet">•  New consumer view = new topic hierarchy</text>
  <text x="62" y="182" class="bullet">•  Aggregations require custom stateful code</text>
  <text x="62" y="208" class="bullet">•  Each consumer maintains its own state</text>
  <text x="62" y="234" class="bullet">•  Time-windowed queries need external stores</text>
  <text x="62" y="260" class="bullet">•  Stream joins require complex consumer logic</text>
  <text x="62" y="286" class="bullet">•  Recovery after restart requires replaying history</text>
  <text x="62" y="332" class="bullet" fill="#FCA829" font-style="italic" font-size="12">Analytical questions require custom engineering per use case</text>

  <!-- VS divider -->
  <line x1="595" y1="100" x2="595" y2="350" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <rect x="574" y="212" width="42" height="26" fill="#03213B" opacity="0.85" rx="4"/>
  <text x="595" y="230" class="vs-label">vs</text>

  <!-- Right panel: "With This Architecture" -->
  <rect x="660" y="90" width="500" height="260" fill="#093B5F" stroke="#00C895" stroke-width="2" rx="10"/>

  <!-- Right panel header background -->
  <rect x="660" y="90" width="500" height="44" fill="#00C895" opacity="0.15" rx="10"/>
  <rect x="660" y="112" width="500" height="22" fill="#00C895" opacity="0.15"/>

  <text x="910" y="118" class="panel-header" fill="#00C895">✓  With This Architecture — Query Design Freedom</text>

  <!-- Right panel bullets -->
  <text x="682" y="156" class="bullet">•  New view = SQL query, not a sprint</text>
  <text x="682" y="182" class="bullet">•  Aggregations pre-computed, always current</text>
  <text x="682" y="208" class="bullet">•  State lives in the streaming layer</text>
  <text x="682" y="234" class="bullet">•  TUMBLE windows in SQL — no external store</text>
  <text x="682" y="260" class="bullet">•  Stream-stream joins materialized automatically</text>
  <text x="682" y="286" class="bullet">•  Agents restart without replaying raw events</text>
  <text x="682" y="332" class="bullet" fill="#00C895" font-style="italic" font-size="12">Analytical questions answered with SQL — no custom code required</text>

  <!-- ===== ROW 3: 5 Cards section (y=375 to y=860) ===== -->

  <!-- Section header -->
  <text x="600" y="400" class="section-label">Business Questions That Cannot Be Answered with Topic Subscriptions Alone</text>
  <line x1="80" y1="408" x2="1120" y2="408" stroke="#00C895" stroke-width="1" opacity="0.3"/>

  <!-- Card dimensions: 5 cards, each 212px wide, gap 10px, starting at x=40 -->
  <!-- Card x positions: 40, 262, 484, 706, 928 -->

  <!-- ===== Card 1: Speed Analytics ===== -->
  <rect x="40" y="420" width="212" height="210" fill="#093B5F" stroke="#00C895" stroke-width="1.5" rx="10"/>

  <!-- Speedometer icon (arc-based) -->
  <g transform="translate(146, 465)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#00C895" stroke-width="2"/>
    <path d="M -15 8 A 18 18 0 0 1 15 8" fill="none" stroke="#ABFF88" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="10" y2="-12" stroke="#ABFF88" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#ABFF88"/>
    <text x="0" y="30" font-family="'Space Mono',monospace" font-size="7" fill="#00C895" text-anchor="middle">mph / kph</text>
  </g>

  <!-- Capability tag -->
  <rect x="86" y="498" width="120" height="16" fill="#00C895" rx="8"/>
  <text x="146" y="510" class="card-tag">Time Windowing</text>

  <!-- Question text (wrapped manually) -->
  <text x="52" y="534" class="card-question">What was average vehicle</text>
  <text x="52" y="550" class="card-question">speed over the last 5 min?</text>

  <!-- Answer text (wrapped manually) -->
  <text x="52" y="572" class="card-answer">vehicle_speed_5min_avg</text>
  <text x="52" y="586" class="card-answer">TUMBLE window,</text>
  <text x="52" y="600" class="card-answer">updated continuously</text>

  <!-- ===== Card 2: Alert Counting ===== -->
  <rect x="262" y="420" width="212" height="210" fill="#093B5F" stroke="#00C895" stroke-width="1.5" rx="10"/>

  <!-- Bell icon -->
  <g transform="translate(368, 465)">
    <path d="M 0 -22 C -12 -22 -16 -12 -16 0 L -16 10 L 16 10 L 16 0 C 16 -12 12 -22 0 -22 Z" fill="none" stroke="#00C895" stroke-width="2"/>
    <line x1="-16" y1="10" x2="16" y2="10" stroke="#00C895" stroke-width="2"/>
    <path d="M -5 10 A 5 5 0 0 0 5 10" fill="none" stroke="#00C895" stroke-width="2"/>
    <circle cx="8" cy="-18" r="5" fill="#FCA829"/>
    <text x="8" y="-15" font-family="'Space Mono',monospace" font-size="7" fill="#03213B" text-anchor="middle" font-weight="bold">!</text>
  </g>

  <!-- Capability tag -->
  <rect x="296" y="498" width="148" height="16" fill="#00C895" rx="8"/>
  <text x="370" y="510" class="card-tag">Rolling Aggregation</text>

  <!-- Question text -->
  <text x="274" y="534" class="card-question">How many high-severity</text>
  <text x="274" y="550" class="card-question">alerts per vehicle / hour?</text>

  <!-- Answer text -->
  <text x="274" y="572" class="card-answer">vehicle_event_counts_1h</text>
  <text x="274" y="586" class="card-answer">rolling window,</text>
  <text x="274" y="600" class="card-answer">always current</text>

  <!-- ===== Card 3: Context Correlation ===== -->
  <rect x="484" y="420" width="212" height="210" fill="#093B5F" stroke="#00C895" stroke-width="1.5" rx="10"/>

  <!-- Two overlapping circles (join) icon -->
  <g transform="translate(590, 462)">
    <circle cx="-10" cy="0" r="18" fill="none" stroke="#ABFF88" stroke-width="2" opacity="0.8"/>
    <circle cx="10" cy="0" r="18" fill="none" stroke="#00C895" stroke-width="2" opacity="0.8"/>
    <!-- Intersection fill hint -->
    <path d="M 0 -14 A 18 18 0 0 1 0 14 A 18 18 0 0 1 0 -14 Z" fill="#00C895" opacity="0.15"/>
    <text x="0" y="4" font-family="'Space Mono',monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">⋈</text>
  </g>

  <!-- Capability tag -->
  <rect x="524" y="498" width="132" height="16" fill="#00C895" rx="8"/>
  <text x="590" y="510" class="card-tag">Stream Join</text>

  <!-- Question text -->
  <text x="496" y="534" class="card-question">What telemetry preceded</text>
  <text x="496" y="550" class="card-question">this alert?</text>

  <!-- Answer text -->
  <text x="496" y="572" class="card-answer">alerts_with_context</text>
  <text x="496" y="586" class="card-answer">stream-stream join</text>
  <text x="496" y="600" class="card-answer">over 2-min window</text>

  <!-- ===== Card 4: Geolocation ===== -->
  <rect x="706" y="420" width="212" height="210" fill="#093B5F" stroke="#00C895" stroke-width="1.5" rx="10"/>

  <!-- Map pin icon -->
  <g transform="translate(812, 462)">
    <path d="M 0 -22 C -10 -22 -16 -14 -16 -6 C -16 6 0 22 0 22 C 0 22 16 6 16 -6 C 16 -14 10 -22 0 -22 Z" fill="none" stroke="#00C895" stroke-width="2"/>
    <circle cx="0" cy="-6" r="6" fill="#ABFF88"/>
    <line x1="-12" y1="24" x2="12" y2="24" stroke="#00C895" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Capability tag -->
  <rect x="752" y="498" width="120" height="16" fill="#00C895" rx="8"/>
  <text x="812" y="510" class="card-tag">Spatial Filter</text>

  <!-- Question text -->
  <text x="718" y="534" class="card-question">Which vehicles are in</text>
  <text x="718" y="550" class="card-question">the Boston area right now?</text>

  <!-- Answer text -->
  <text x="718" y="572" class="card-answer">vehicles_in_region_boston</text>
  <text x="718" y="586" class="card-answer">spatial predicate,</text>
  <text x="718" y="600" class="card-answer">live</text>

  <!-- ===== Card 5: Fleet Summary ===== -->
  <rect x="928" y="420" width="232" height="210" fill="#093B5F" stroke="#00C895" stroke-width="1.5" rx="10"/>

  <!-- Bar chart icon -->
  <g transform="translate(1044, 462)">
    <rect x="-24" y="-4" width="10" height="16" fill="#FCA829" rx="1"/>
    <rect x="-10" y="-14" width="10" height="26" fill="#00C895" rx="1"/>
    <rect x="4" y="-22" width="10" height="34" fill="#ABFF88" rx="1"/>
    <rect x="18" y="-8" width="10" height="20" fill="#00C895" opacity="0.6" rx="1"/>
    <line x1="-28" y1="14" x2="32" y2="14" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Capability tag -->
  <rect x="952" y="498" width="190" height="16" fill="#00C895" rx="8"/>
  <text x="1047" y="510" class="card-tag">Cross-stream Aggregation</text>

  <!-- Question text -->
  <text x="940" y="534" class="card-question">Fleet-wide alert breakdown</text>
  <text x="940" y="550" class="card-question">by severity?</text>

  <!-- Answer text -->
  <text x="940" y="572" class="card-answer">fleet_alert_summary</text>
  <text x="940" y="586" class="card-answer">GROUP BY, updated</text>
  <text x="940" y="600" class="card-answer">in real time</text>

  <!-- ===== Bottom footer bar ===== -->
  <rect x="0" y="648" width="1200" height="2" fill="#ABFF88" opacity="0.15"/>

  <!-- Architecture summary strip -->
  <rect x="0" y="650" width="1200" height="60" fill="#093B5F" opacity="0.5"/>

  <!-- Three architecture components -->
  <text x="240" y="673" font-family="'Figtree','Segoe UI',sans-serif" font-size="13px" font-weight="bold" fill="#00C895" text-anchor="middle">Solace Platform</text>
  <text x="240" y="691" font-family="'Figtree','Segoe UI',sans-serif" font-size="11px" fill="#FFFFFF" text-anchor="middle">Real-time pub/sub routing</text>
  <text x="240" y="704" font-family="'Space Mono',monospace" font-size="9px" fill="#ABFF88" text-anchor="middle">Low-latency · rich topics · fan-out</text>

  <!-- Arrow 1 (direct: Solace → RisingWave via RDP) -->
  <line x1="380" y1="680" x2="800" y2="680" stroke="#00C895" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="556" y="668" width="88" height="16" fill="#03213B" opacity="0.75" rx="3"/>
  <text x="600" y="680" font-family="'Space Mono',monospace" font-size="8px" fill="#00C895" text-anchor="middle">RDP / HTTP POST</text>

  <text x="960" y="673" font-family="'Figtree','Segoe UI',sans-serif" font-size="13px" font-weight="bold" fill="#ABFF88" text-anchor="middle">RisingWave</text>
  <text x="960" y="691" font-family="'Figtree','Segoe UI',sans-serif" font-size="11px" fill="#FFFFFF" text-anchor="middle">Streaming analytics</text>
  <text x="960" y="704" font-family="'Space Mono',monospace" font-size="9px" fill="#ABFF88" text-anchor="middle">Incremental SQL · always-current MVs</text>

  <!-- ===== Bottom callout ===== -->
  <rect x="40" y="724" width="1120" height="56" fill="#00C895" opacity="0.15" rx="8" stroke="#00C895" stroke-width="1"/>
  <text x="600" y="742" font-family="'New Spirit','Georgia',serif" font-size="14px" font-weight="bold" fill="#00C895" text-anchor="middle">The result: a digital nervous system that routes events</text>
  <text x="600" y="758" font-family="'New Spirit','Georgia',serif" font-size="14px" font-weight="bold" fill="#00C895" text-anchor="middle">AND answers business questions — in real time, without custom engineering.</text>
  <text x="600" y="768" font-family="'Figtree','Segoe UI',sans-serif" font-size="12px" fill="#FFFFFF" text-anchor="middle">Any team can add a new analytical view with a SQL query. No new consumers. No new topic hierarchies. No sprint required.</text>

</svg>
