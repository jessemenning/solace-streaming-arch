networks:
  streaming-net:
    driver: bridge

volumes:
  solace-data:

services:

  # ─── Solace Platform Event Broker ─────────────────────────────────────────
  solace:
    image: solace/solace-pubsub-standard:latest
    hostname: solace
    container_name: solace
    networks:
      - streaming-net
    ports:
      - "8180:8080"   # SEMP admin REST API (host 8080 already in use → mapped to 8180)
      - "55555:55555" # SMF (Solace Message Format — native protocol)
      - "1883:1883"   # MQTT
      - "8008:8008"   # WebSocket / MQTT over WS
    environment:
      - username_admin_globalaccesslevel=admin
      - username_admin_password=admin
      - system_scaling_maxconnectioncount=100
    shm_size: "1g"
    stop_grace_period: 20s
    ulimits:
      core:
        soft: 1
        hard: 1
    volumes:
      - solace-data:/var/lib/solace
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -sf -u admin:admin http://localhost:8080/SEMP/v2/config/about/api > /dev/null"
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s

  # ─── RisingWave (streaming SQL materialized views) ────────────────────────
  # Receives fleet telemetry via Solace RDP → HTTP POST to webhook endpoint.
  # Webhook endpoint: http://risingwave:4560/webhook/dev/public/fleet_all_raw
  risingwave:
    image: risingwavelabs/risingwave:latest
    container_name: risingwave
    hostname: risingwave
    networks:
      - streaming-net
    ports:
      - "4566:4566" # Frontend SQL (Postgres wire protocol)
      - "4560:4560" # HTTP API — webhook ingestion endpoint
      - "5691:5691" # Dashboard / metadata
    command: playground
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c 'echo > /dev/tcp/localhost/4566' 2>/dev/null || exit 1"
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s

  # ─── Fleet telemetry simulator ───────────────────────────────────────────
  fleet-generator:
    build:
      context: ./generator
      dockerfile: Dockerfile
    container_name: fleet-generator
    hostname: fleet-generator
    networks:
      - streaming-net
    environment:
      SOLACE_HOST: tcp://solace:55555
      SOLACE_VPN: streaming-poc
      SOLACE_USER: streaming-user
      SOLACE_PASSWORD: default
      BURST: "${BURST:-false}"
      NUM_VEHICLES: "${NUM_VEHICLES:-10}"
      TELEMETRY_INTERVAL: "${TELEMETRY_INTERVAL:-5.0}"
    depends_on:
      solace:
        condition: service_healthy
    restart: on-failure

  # ─── Fleet Operations AI (agentic demo UI) ───────────────────────────────
  fleet-agent:
    build:
      context: ./demo
      dockerfile: Dockerfile
    container_name: fleet-agent
    hostname: fleet-agent
    networks:
      - streaming-net
    ports:
      - "8090:8090"
    env_file: ./.env
    environment:
      RW_HOST: risingwave   # override localhost → Docker internal hostname
      RW_PORT: "4566"
    depends_on:
      risingwave:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -sf http://localhost:8090/ > /dev/null"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Solace+ Try Me (enhanced Try Me tab with history replay) ───────────────
  tryme:
    build:
      context: ./tryme
      dockerfile: Dockerfile
    container_name: tryme
    hostname: tryme
    networks:
      - streaming-net
    ports:
      - "8091:8091"
    env_file: ./.env
    environment:
      RW_HOST: risingwave
      RW_PORT: "4566"
      SOLACE_HOST: tcp://solace:55555
      SOLACE_VPN: streaming-poc
      SOLACE_USER: streaming-user
      SOLACE_PASSWORD: default
      REGISTRY_PATH: /app/config/topic-mv-registry.yaml
    volumes:
      - ./config/topic-mv-registry.yaml:/app/config/topic-mv-registry.yaml:ro
    depends_on:
      solace:
        condition: service_healthy
      risingwave:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -sf http://localhost:8091/ > /dev/null"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Event Portal setup (idempotent — creates domain/schemas/events/apps) ──
  # Runs once: 1) create EP objects  2) generate init.sql  3) apply to RisingWave
  ep-setup:
    build:
      context: .
      dockerfile: config/ep-setup/Dockerfile
    container_name: ep-setup
    networks:
      - streaming-net
    env_file: ./.env
    environment:
      RW_HOST: risingwave
      RW_PORT: "4566"
    depends_on:
      risingwave:
        condition: service_healthy
    restart: "no"
