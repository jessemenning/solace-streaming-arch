version: "1.0"

risingwave:
  host: "${RW_HOST:-localhost}"
  port: "${RW_PORT:-4566}"
  database: dev
  user: root

solace:
  smf_host: "${SOLACE_HOST:-tcp://localhost:55555}"
  vpn: "${SOLACE_VPN:-streaming-poc}"
  username: "${SOLACE_USER:-streaming-user}"
  password: "${SOLACE_PASSWORD:-default}"

mappings:
  - pattern: "fleet/telemetry/*/metrics/speed"
    mv: vehicle_speeds
    time_column: recorded_at
    aggregates:
      window_5min: vehicle_speed_5min_avg
  - pattern: "fleet/events/*/alerts/high"
    mv: high_severity_alerts
    time_column: occurred_at
    enriched: alerts_with_context
  - pattern: "fleet/events/*/alerts/medium"
    mv: medium_severity_alerts
    time_column: occurred_at
  - pattern: "fleet/events/*/alerts/low"
    mv: low_severity_alerts
    time_column: occurred_at
  - pattern: "fleet/telemetry/*/metrics/location"
    mv: vehicle_last_known_position
    time_column: recorded_at
    spatial:
      boston: vehicles_in_region_boston
  - pattern: "fleet/telemetry/*/metrics/fuel_level"
    mv: vehicle_fuel_levels
    time_column: recorded_at
  - pattern: "fleet/telemetry/*/metrics/engine_temp"
    mv: high_engine_temp_vehicles
    time_column: recorded_at
  - pattern: "fleet/telemetry/*"
    mv: fleet_telemetry_raw
    time_column: recorded_at
  - pattern: "fleet/events/*"
    mv: fleet_events_raw
    time_column: occurred_at
  - pattern: "fleet/commands/*"
    mv: fleet_commands_raw
    time_column: issued_at
